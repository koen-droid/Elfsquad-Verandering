<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementatieplanning — Systeem Transitie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#1A56DB; --blue-light:#EBF1FF; --blue-dark:#1240a8;
  --green:#0B7B5A; --green-light:#E3F5EE;
  --amber:#B45309; --amber-light:#FEF3C7;
  --red:#9B1C1C; --red-light:#FEE2E2;
  --purple:#5B21B6; --purple-light:#EDE9FE;
  --g50:#F9FAFB; --g100:#F3F4F6; --g200:#E5E7EB; --g300:#D1D5DB;
  --g400:#9CA3AF; --g500:#6B7280; --g600:#4B5563; --g700:#374151;
  --g800:#1F2937; --g900:#111827;
  --r:10px; --sh:0 1px 3px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;color:var(--g800);background:var(--g50);min-height:100vh}

.topbar{background:var(--g900);color:white;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:14px;font-weight:500}
.topbar-sub{font-size:12px;color:var(--g400);margin-left:4px}
.topbar-right{font-size:12px;color:var(--g400);font-family:'DM Mono',monospace}

.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 56px)}

.sidebar{background:white;border-right:1px solid var(--g200);padding:1.25rem 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-section{padding:0 .75rem;margin-bottom:.25rem}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);padding:0 1.25rem;margin:.75rem 0 .4rem}
.sb-btn{display:flex;align-items:flex-start;gap:10px;width:100%;padding:.5rem .75rem;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left;transition:background .15s}
.sb-btn:hover{background:var(--g100)}
.sb-btn.active{background:var(--g100)}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sb-name{font-size:12px;font-weight:500;color:var(--g700);line-height:1.3}
.sb-weeks{font-size:11px;color:var(--g400);margin-top:1px}
.sb-tasks{padding-left:2rem;margin-top:.1rem}
.sb-task{display:block;width:100%;padding:.3rem .5rem;border:none;background:transparent;border-radius:6px;cursor:pointer;text-align:left;font-size:12px;color:var(--g500);transition:all .15s;line-height:1.4}
.sb-task:hover{background:var(--g100);color:var(--g700)}
.sb-task.active{background:var(--blue-light);color:var(--blue);font-weight:500}
.sb-divider{height:1px;background:var(--g200);margin:.75rem .75rem}
.sb-progress{padding:.75rem 1.25rem}
.sb-prog-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);margin-bottom:.5rem}
.sb-prog-row{display:flex;align-items:center;gap:8px;margin-bottom:.4rem}
.sb-prog-name{font-size:11px;color:var(--g500);min-width:16px}
.sb-prog-track{flex:1;height:4px;background:var(--g100);border-radius:2px;overflow:hidden}
.sb-prog-fill{height:100%;border-radius:2px;transition:width .3s}
.sb-prog-pct{font-size:10px;color:var(--g400);min-width:28px;text-align:right;font-family:'DM Mono',monospace}

.main{padding:2rem;overflow-y:auto}

.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g400);margin-bottom:1.5rem;flex-wrap:wrap}
.breadcrumb .bc-link{cursor:pointer;transition:color .15s}
.breadcrumb .bc-link:hover{color:var(--blue)}
.breadcrumb .bc-sep{color:var(--g300)}
.breadcrumb .bc-cur{color:var(--g700);font-weight:500}

/* OVERVIEW */
.ov-header{margin-bottom:2rem}
.ov-header h1{font-size:26px;font-weight:600;color:var(--g900);margin-bottom:6px}
.ov-header p{font-size:14px;color:var(--g500);max-width:600px;line-height:1.7}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem}
.stat-card{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1rem 1.25rem}
.stat-card .num{font-size:28px;font-weight:600;color:var(--g900);line-height:1}
.stat-card .lbl{font-size:12px;color:var(--g500);margin-top:4px}

.alert-box{background:#FFF7ED;border:1px solid #FED7AA;border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;gap:12px;align-items:flex-start}
.alert-icon{font-size:18px;flex-shrink:0;line-height:1.4}
.alert-text{font-size:13px;color:#92400E;line-height:1.6}
.alert-text strong{font-weight:600}

.gantt-card{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-bottom:2rem;overflow-x:auto}
.gantt-card h2{font-size:14px;font-weight:600;color:var(--g700);margin-bottom:1.25rem}
.gantt-inner{min-width:580px}
.gantt-row{display:grid;grid-template-columns:160px 1fr;gap:10px;align-items:center;margin-bottom:5px}
.gantt-lbl{font-size:11px;color:var(--g500);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{position:relative;height:20px;background:var(--g100);border-radius:4px}
.gantt-bar{position:absolute;top:1px;bottom:1px;border-radius:3px;cursor:pointer;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:500;color:white;white-space:nowrap;overflow:hidden;transition:opacity .15s}
.gantt-bar:hover{opacity:.82}
.gantt-week-header{display:grid;grid-template-columns:160px 1fr;gap:10px;margin-bottom:6px}
.gantt-weeks{display:flex}
.gantt-wlbl{flex:1;font-size:10px;color:var(--g400);text-align:center;font-family:'DM Mono',monospace}
.gantt-phase-sep{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);padding:6px 0 2px;grid-column:1/-1}

.phases-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.phase-card{background:white;border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
.phase-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.10);transform:translateY(-2px)}
.pc-header{padding:1rem 1.25rem;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:12px}
.pc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pc-name{font-size:13px;font-weight:600}
.pc-period{font-size:11px;color:var(--g400);margin-top:2px}
.pc-body{padding:1rem 1.25rem}
.pc-tasks{font-size:12px;color:var(--g500);list-style:none}
.pc-tasks li{padding:2px 0;display:flex;align-items:flex-start;gap:6px}
.pc-tasks li::before{content:"→";color:var(--g300);flex-shrink:0}
.pc-arrow{padding:.65rem 1.25rem;display:flex;justify-content:flex-end;font-size:12px;color:var(--blue);font-weight:500;border-top:1px solid var(--g100)}

/* PHASE PAGE */
.ph-header{border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;display:flex;align-items:flex-start;gap:1rem}
.ph-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,255,255,.45);flex-shrink:0}
.ph-header h1{font-size:20px;font-weight:600;margin-bottom:4px}
.ph-header p{font-size:13px;opacity:.8;line-height:1.6}
.ph-pills{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.4)}

.dod-box{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.dod-box h2{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:1rem}
.dod-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.dod-col h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.dod-col ul{list-style:none}
.dod-col ul li{font-size:12px;color:var(--g600);padding:5px 0 5px 18px;position:relative;border-bottom:1px solid var(--g100);line-height:1.4}
.dod-col ul li:last-child{border-bottom:none}
.dod-col ul li::before{content:"✓";position:absolute;left:0;font-size:11px;color:var(--g400)}

.tasks-section h2{font-size:14px;font-weight:600;color:var(--g700);margin-bottom:1rem}
.task-card{background:white;border:1px solid var(--g200);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.task-card:hover{box-shadow:var(--sh)}
.tc-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;cursor:pointer;user-select:none}
.tc-left{display:flex;align-items:center;gap:12px}
.tc-num{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.tc-name{font-size:13px;font-weight:500;color:var(--g800)}
.tc-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.tc-week{font-size:11px;color:var(--g400);font-family:'DM Mono',monospace}
.who-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.who-tech{background:#EBF5FF;color:#1A56DB}
.who-adopt{background:#FEF3C7;color:#92400E}
.who-mgmt{background:#F5F3FF;color:#5B21B6}
.tc-right{display:flex;align-items:center;gap:12px}
.tc-prog-wrap{width:60px;height:4px;background:var(--g100);border-radius:2px;overflow:hidden}
.tc-prog-fill{height:100%;border-radius:2px}
.tc-pct{font-size:11px;font-weight:500;min-width:28px;text-align:right}
.tc-cta{font-size:12px;color:var(--blue);font-weight:500;white-space:nowrap}

/* TASK DETAIL */
.td-header{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem}
.td-header h1{font-size:20px;font-weight:600;color:var(--g900);margin-bottom:8px}
.td-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.td-desc{font-size:14px;color:var(--g600);line-height:1.7}
.td-why{background:var(--g50);border-left:3px solid var(--g300);padding:.75rem 1rem;margin-top:1rem;border-radius:0 6px 6px 0}
.td-why p{font-size:13px;color:var(--g600);line-height:1.6}
.td-why strong{color:var(--g700)}

.actions-box{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem}
.actions-box h2{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:1rem}
.action-item{display:flex;align-items:flex-start;gap:12px;padding:.65rem 0;border-bottom:1px solid var(--g100)}
.action-item:last-child{border-bottom:none}
.action-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--g300);flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;user-select:none}
.action-check.done{background:var(--green);border-color:var(--green)}
.action-text{font-size:13px;color:var(--g700);line-height:1.5;flex:1}
.action-text.done{text-decoration:line-through;color:var(--g400)}
.action-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0;margin-top:2px}

.nav-between{display:flex;justify-content:space-between;margin-top:1rem;gap:8px}
.nav-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;background:transparent;border:none;cursor:pointer;padding:.5rem 1rem;border-radius:8px;transition:background .15s;color:var(--g500)}
.nav-btn:hover{background:var(--g100);color:var(--g700)}
.nav-btn.next{color:var(--blue)}
.nav-btn.next:hover{background:var(--blue-light)}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--g200)}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .phases-grid{grid-template-columns:1fr}
  .dod-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">S</div>
    <span class="topbar-title">Systeem Transitie — Implementatieplanning</span>
    <span class="topbar-sub">HubSpot · Elfsquad · Business Central</span>
  </div>
  <div class="topbar-right">6 maanden · 15+ personen</div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<script>
const WEEKS = 24;

const PHASES = [
  {
    id:0, emoji:"🔍", name:"Fase 1 — Fundament leggen", color:"#1A56DB", bg:"#EBF1FF",
    weeks:"Week 1 – 4", ws:0, wd:4,
    intro:"Voordat er ook maar iets technisch gebouwd wordt, moet het fundament op orde zijn. In deze fase weet je precies wat er moet gebeuren, wie het gaat doen en heeft het team begrepen waarom de verandering nodig is.",
    dod:{
      tech:[
        "Er is een technische partij gekozen voor HubSpot-integraties",
        "Er is een technische partij gekozen voor Business Central",
        "Beide partijen hebben een schriftelijk akkoord op scope en planning",
        "Het is duidelijk welke velden tussen de systemen heen en weer gaan",
        "Er is een testomgeving beschikbaar"
      ],
      adoptie:[
        "Alle 15+ medewerkers zijn geïnformeerd over de verandering en het waarom",
        "Elke medewerker weet wat zijn/haar nieuwe rol wordt",
        "Er is één intern projectverantwoordelijke aangewezen",
        "Medewerkers hebben de kans gehad vragen en zorgen te uiten",
        "Er is een vast overlegmoment ingepland voor de rest van het project"
      ]
    },
    tasks:[
      {
        id:"1-1", name:"Technische partij selecteren voor HubSpot", week:"Week 1 – 2", ws:0, wd:2, who:"mgmt",
        why:"Zonder een bevestigde technische partij kan de bouw niet starten. Dit is de meest kritieke blokkade op dit moment. Alles staat of valt bij het kiezen van de juiste partij die snel beschikbaar is.",
        desc:"Je hebt een externe partij nodig die de koppelingen bouwt tussen HubSpot, Elfsquad en Business Central. Dit is gespecialiseerd werk — het gaat om API-koppelingen die foutloos moeten werken.",
        actions:[
          {t:"Maak een shortlist van minimaal 3 partijen die HubSpot-integraties bouwen.", who:"mgmt"},
          {t:"Controleer per partij: hebben ze ervaring met Elfsquad-koppelingen?", who:"mgmt"},
          {t:"Stuur elke partij een korte briefing: wat moet er worden gebouwd (HubSpot ↔ Elfsquad ↔ BC), hoeveel gebruikers, gewenste livegang.", who:"mgmt"},
          {t:"Vraag een offerte én een indicatieve planning op bij elke partij.", who:"mgmt"},
          {t:"Beoordeel de offertes op prijs, doorlooptijd en referenties bij vergelijkbare projecten.", who:"mgmt"},
          {t:"Maak een keuze en bevestig schriftelijk aan de gekozen partij.", who:"mgmt"},
          {t:"Plan een eerste werksessie in met de gekozen partij binnen 1 week na akkoord.", who:"mgmt"}
        ],
        dod:{tech:["Partij gekozen en schriftelijk bevestigd","Eerste werksessie ingepland"],adoptie:[]}
      },
      {
        id:"1-2", name:"Technische partij selecteren voor Business Central", week:"Week 1 – 2", ws:0, wd:2, who:"mgmt",
        why:"BC heeft een eigen partner nodig omdat het een Microsoft-product is met specifieke kennis vereist. Dit kan dezelfde partij zijn als HubSpot, maar dat hoeft niet.",
        desc:"Business Central heeft een gecertificeerde Microsoft-partner nodig voor aanpassingen en koppelingen. Bliss is een bekende partij, maar je bent vrij om alternatieven te vergelijken.",
        actions:[
          {t:"Vraag bij je huidige BC-leverancier na of zij ook integraties met HubSpot/Elfsquad kunnen bouwen.", who:"mgmt"},
          {t:"Zoek minimaal 1 alternatieve BC-partner en vraag hen dezelfde briefing toe te sturen.", who:"mgmt"},
          {t:"Beslis: ga je met één partij voor alles (HubSpot + BC) of twee aparte partijen?", who:"mgmt"},
          {t:"Bevestig de BC-partij schriftelijk met scope en planning.", who:"mgmt"},
          {t:"Zorg dat de HubSpot-partij en BC-partij met elkaar kennismaken als het aparte partijen zijn.", who:"mgmt"}
        ],
        dod:{tech:["BC-partij gekozen en bevestigd","Afstemming HubSpot- en BC-partij heeft plaatsgevonden"],adoptie:[]}
      },
      {
        id:"1-3", name:"Intern projectverantwoordelijke aanwijzen", week:"Week 1", ws:0, wd:1, who:"mgmt",
        why:"Bij 15+ personen en meerdere externe partijen is er één intern aanspreekpunt nodig die het overzicht houdt. Zonder dit aanspreekpunt raken verantwoordelijkheden versnipperd.",
        desc:"Eén persoon intern die het project aanstuurt: de brug tussen het management, de technische partijen en het team. Dit hoeft geen technisch persoon te zijn, maar wel iemand met overzicht en beslissingsbevoegdheid.",
        actions:[
          {t:"Benoem intern één projectverantwoordelijke voor deze transitie.", who:"mgmt"},
          {t:"Omschrijf de rol schriftelijk: wat beslist deze persoon zelf, wanneer escaleert hij/zij?", who:"mgmt"},
          {t:"Geef de projectverantwoordelijke wekelijks een vast overlegmoment met de technische partijen.", who:"mgmt"},
          {t:"Communiceer de naam en rol van de projectverantwoordelijke aan het hele team.", who:"mgmt"}
        ],
        dod:{tech:[],adoptie:["Projectverantwoordelijke aangewezen en gecommuniceerd aan het team"]}
      },
      {
        id:"1-4", name:"Kick-off sessie met het hele team", week:"Week 2 – 3", ws:1, wd:2, who:"adopt",
        why:"15+ mensen die verrast worden door een nieuwe werkwijze is een recept voor weerstand. Vroeg communiceren, het 'waarom' uitleggen en ruimte geven voor vragen maakt het verschil tussen adoptie en sabotage.",
        desc:"Een kick-off is geen PowerPoint-presentatie die je 'doet'. Het is een tweezijdig gesprek waarbij je medewerkers de kans geeft mee te denken en hun zorgen te uiten. Hoe meer betrokkenheid nu, hoe minder weerstand later.",
        actions:[
          {t:"Plan een kick-off sessie van 1,5 uur voor alle betrokken medewerkers (binnendienst, buitendienst, werkvoorbereiders).", who:"mgmt"},
          {t:"Bereid de sessie voor met: (1) wat gaat er nu mis, (2) wat wordt het straks, (3) wat verandert er voor jou, (4) wanneer gaat wat.", who:"mgmt"},
          {t:"Leg uit waarom jullie Elfsquad als centrale offertetool kiezen en BC alleen voor orders.", who:"mgmt"},
          {t:"Leg per rol uit wat er concreet verandert: binnendienst, buitendienst, werkvoorbereider.", who:"mgmt"},
          {t:"Geef medewerkers 20 minuten voor vragen — noteer alles op een flipover of scherm.", who:"mgmt"},
          {t:"Stuur binnen 24 uur na de kick-off een samenvatting via mail/app: dit bespraken we, dit zijn de volgende stappen.", who:"mgmt"},
          {t:"Houd na de kick-off een korte anonieme poll (Google Forms / Teams): hoe duidelijk is het voor jou? Score 1–5.", who:"mgmt"},
          {t:"Bij scores onder 3: plan een extra toelichting voor die medewerker(s) binnen 1 week.", who:"mgmt"}
        ],
        dod:{tech:[],adoptie:["Kick-off gehouden, alle medewerkers aanwezig of achteraf bijgepraat","Poll afgenomen, scores gedocumenteerd","Extra toelichting ingepland voor medewerkers met score onder 3"]}
      },
      {
        id:"1-5", name:"Processen en rollen vastleggen op papier", week:"Week 3 – 4", ws:2, wd:2, who:"mgmt",
        why:"Iedereen moet weten wat zijn/haar nieuwe rol precies is. Niet globaal, maar concreet: welke stap doe jij, wanneer geef jij het over aan de volgende persoon, en wat doe je niet meer.",
        desc:"Schrijf per rol een simpele taakomschrijving van maximaal 1 A4. Geen HR-document, maar een praktisch 'dit doe ik'-overzicht dat een medewerker op zijn bureau kan leggen.",
        actions:[
          {t:"Schrijf de nieuwe taakomschrijving voor de binnendienst: welke stappen doorloopt hij/zij in HubSpot en Elfsquad.", who:"mgmt"},
          {t:"Noteer expliciet wat de binnendienst NIET meer doet: geen voorraad checken, geen montage inplannen.", who:"mgmt"},
          {t:"Schrijf de nieuwe taakomschrijving voor de buitendienst: hoe maakt hij/zij een offerte in Elfsquad, hoe volgt hij deals op.", who:"mgmt"},
          {t:"Noteer expliciet wat de buitendienst NIET meer doet: geen after-sales, geen operationele taken.", who:"mgmt"},
          {t:"Schrijf de nieuwe taakomschrijving voor de werkvoorbereider/projectcoördinator: vanaf wanneer pakt hij over, wat doet hij in BC.", who:"mgmt"},
          {t:"Laat elke medewerker zijn/haar eigen taakomschrijving lezen en bevestigen ('klopt dit?').", who:"mgmt"},
          {t:"Verwerk de feedback en maak een definitieve versie.", who:"mgmt"}
        ],
        dod:{tech:[],adoptie:["Taakomschrijving per rol klaar en gevalideerd door minimaal één medewerker per rol"]}
      }
    ]
  },
  {

          {t:"Doorloop scenario 2: maak een tweede versie van de offerte in Elfsquad en controleer of het versienummer correct wordt bijgewerkt in HubSpot.", who:"tech"},
          {t:"Doorloop scenario 3: zet een deal op 'Verloren' en controleer dat er niets naar BC wordt gestuurd.", who:"tech"},
          {t:"Test foutpreventie: stuur dezelfde deal twee keer naar BC en controleer dat er maar één order wordt aangemaakt.", who:"tech"},
          {t:"Laat één binnendienst- en één buitendienst-medewerker meedoen en documenteer alles waar ze vastlopen.", who:"mgmt"},
          {t:"Maak een buglijst met ernst-classificatie: blokkerend (moet opgelost voor pilot) / niet-blokkerend (mag na livegang).", who:"tech"},
          {t:"Laat de technische partij alle blokkerende bugs oplossen voordat de pilotfase start.", who:"tech"}
        ],
        dod:{tech:["Alle 3 testscenario's zonder blokkerende fouten doorlopen","Buglijst opgesteld, blokkerende fouten opgelost"],adoptie:["Medewerkers hebben meegedaan aan de test en bevindingen gedeeld"]}
      },
      {
        id:"4-2", name:"Pilotfase — eerste echte deals via nieuwe flow", week:"Week 21 – 23", ws:20, wd:3, who:"adopt",
        why:"De stap van testen naar productie is groot. Een gecontroleerde pilot met 2–3 echte deals geeft je de kans om echte problemen te signaleren zonder alle 15+ medewerkers tegelijk in het diepe te gooien.",
        desc:"Selecteer bewust 2–3 eenvoudige, echte deals voor de pilot. Begeleid de medewerkers actief. Documenteer alles wat niet soepel gaat.",
        actions:[
          {t:"Selecteer 2–3 echte klantdeals voor de pilot: kies kleine, eenvoudige orders — niet de grootste klant.", who:"mgmt"},
          {t:"Informeer de betrokken medewerkers: deze deals gaan via de nieuwe flow, we begeleiden jullie actief.", who:"mgmt"},
          {t:"Begeleid de binnendienst stap voor stap bij het aanmaken van de klant en deal in HubSpot.", who:"mgmt"},
          {t:"Begeleid de buitendienst bij het aanmaken van de offerte in Elfsquad.", who:"mgmt"},
          {t:"Controleer na elke stap of de data correct is doorgekomen: HubSpot → Elfsquad, Elfsquad → HubSpot, HubSpot → BC.", who:"tech"},
          {t:"Laat medewerkers reflecteren na elke deal: wat ging goed, wat was verwarrend, wat ontbrak?", who:"mgmt"},
          {t:"Documenteer alle bevindingen in een lijst: blokkerend / niet-blokkerend / wens voor later.", who:"mgmt"},
          {t:"Los blokkerende bevindingen op voordat de livegang plaatsvindt.", who:"tech"}
        ],
        dod:{tech:["Minimaal 3 echte deals zonder blokkerende fouten verwerkt"],adoptie:["Medewerkers hebben de pilot zelfstandig uitgevoerd (met begeleiding)","Bevindingen gedocumenteerd en besproken"]}
      },
      {
        id:"4-3", name:"Livegang — officiële overstap", week:"Week 23 – 24", ws:22, wd:2, who:"mgmt",
        why:"De livegang is een mijlpaal, geen verrassing. Zorg voor een zachte landing: duidelijke communicatie, een aanspreekpunt, en een plan als er toch iets mis gaat.",
        desc:"Vanaf de livegang gaan alle nieuwe deals via de nieuwe werkwijze. Communiceer dit helder, zorg voor ondersteuning de eerste weken en monitor actief op fouten.",
        actions:[
          {t:"Communiceer de exacte livegangdatum minimaal 1 week van tevoren aan het hele team.", who:"mgmt"},
          {t:"Stuur op de dag van livegang een bericht aan het team: 'Vanaf vandaag werken we via de nieuwe flow. Vragen? Neem contact op met [naam aanspreekpunt].'", who:"mgmt"},
          {t:"Zorg dat alle medewerkers hun cheat sheets en werkinstructies bij de hand hebben op dag 1.", who:"mgmt"},
          {t:"Archiveer of sluit alle openstaande offertes in BC die via de oude methode zijn aangemaakt.", who:"tech"},
          {t:"Laat de technische partij monitoring inrichten: automatische melding bij mislukte API-call of synchronisatiefout.", who:"tech"},
          {t:"Wijs een intern aanspreekpunt aan voor de eerste 4 weken: één persoon die spoedvragen oppakt.", who:"mgmt"},
          {t:"Plan dagelijks een kort check-in moment de eerste week (bijv. 10 minuten 's ochtends): hoe gaat het?", who:"mgmt"},
          {t:"Documenteer het terugvalscenario: wat doen we als de koppeling uitvalt? (Tijdelijk handmatig werken, wie belt de technische partij?)", who:"mgmt"},
          {t:"Plan een evaluatiesessie van 1 uur na 2 weken livegang met het hele team.", who:"mgmt"},
          {t:"Stuur na 4 weken een korte enquête: wat werkt goed, wat kan beter?", who:"mgmt"}
        ],
        dod:{tech:["Monitoring actief en verantwoordelijke aangewezen","Terugvalscenario gedocumenteerd"],adoptie:["Alle medewerkers werken via nieuwe flow","Evaluatiesessie na 2 weken gehouden","Actiepunten uit evaluatie ingepland"]}
      }
    ]
  }
];

let view={page:'overview',phaseId:null,taskId:null};
let checks=JSON.parse(localStorage.getItem('enc_v2_checks')||'{}');
function save(){localStorage.setItem('enc_v2_checks',JSON.stringify(checks))}

function whoTag(w){
  if(w==='tech') return {label:'Techniek',cls:'who-tech'};
  if(w==='adopt') return {label:'Adoptie / HR',cls:'who-adopt'};
  return {label:'Management',cls:'who-mgmt'};
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  let h='';
  PHASES.forEach((ph,pi)=>{
    const active=view.phaseId===pi;
    h+=`<div class="sb-section"><button class="sb-btn${active?' active':''}" onclick="nav({page:'phase',phaseId:${pi}})">
      <div class="sb-dot" style="background:${ph.color}"></div>
      <div><div class="sb-name">${ph.name}</div><div class="sb-weeks">${ph.weeks}</div></div>
    </button>`;
    if(active){
      h+=`<div class="sb-tasks">`;
      ph.tasks.forEach(t=>{
        h+=`<button class="sb-task${view.taskId===t.id?' active':''}" onclick="nav({page:'task',phaseId:${pi},taskId:'${t.id}'})">${t.name}</button>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  h+=`<div class="sb-divider"></div><div class="sb-progress"><div class="sb-prog-label">Voortgang</div>`;
  PHASES.forEach((ph,pi)=>{
    let tot=0,done=0;
    ph.tasks.forEach(t=>t.actions.forEach((_,ai)=>{tot++;if(checks[`${t.id}-${ai}`])done++;}));
    const pct=tot?Math.round(done/tot*100):0;
    h+=`<div class="sb-prog-row"><div class="sb-prog-name">${ph.emoji}</div><div class="sb-prog-track"><div class="sb-prog-fill" style="width:${pct}%;background:${ph.color}"></div></div><div class="sb-prog-pct">${pct}%</div></div>`;
  });
  h+=`</div>`;
  sb.innerHTML=h;
}

function bc(items){
  return `<div class="breadcrumb">${items.map((it,i)=>{
    if(i===items.length-1) return `<span class="bc-cur">${it.label}</span>`;
    return `<span class="bc-link" onclick="${it.nav}">${it.label}</span><span class="bc-sep">›</span>`;
  }).join('')}</div>`;
}

function renderOverview(){
  let tot=0,done=0;
  PHASES.forEach(ph=>ph.tasks.forEach(t=>t.actions.forEach((_,ai)=>{tot++;if(checks[`${t.id}-${ai}`])done++;})));
  let h=bc([{label:'Overzicht'}]);
  h+=`<div class="ov-header"><h1>Implementatieplanning — Systeem Transitie</h1>
    <p>Van versnipperde processen naar één gestroomlijnde flow via HubSpot, Elfsquad en Business Central. 15+ medewerkers, 6 maanden, 4 fasen.</p></div>`;
  h+=`<div class="stats-row">
    <div class="stat-card"><div class="num">4</div><div class="lbl">Fasen</div></div>
    <div class="stat-card"><div class="num">24</div><div class="lbl">Weken totaal</div></div>
    <div class="stat-card"><div class="num">${tot}</div><div class="lbl">Concrete acties</div></div>
    <div class="stat-card"><div class="num">${done}/${tot}</div><div class="lbl">Afgerond</div></div>
  </div>`;
  h+=`<div class="alert-box"><div class="alert-icon">⚠️</div><div class="alert-text"><strong>Eerste prioriteit: technische partij regelen.</strong> De bouw kan pas starten als jullie een bevestigde technische partij hebben voor HubSpot-integraties én Business Central. Dit is de meest kritieke actie van dit moment — begin hier.</div></div>`;

  // Gantt
  h+=`<div class="gantt-card"><h2>Tijdlijn — 24 weken</h2><div class="gantt-inner">`;
  h+=`<div class="gantt-week-header"><div></div><div class="gantt-weeks">`;
  for(let w=1;w<=WEEKS;w++) h+=`<div class="gantt-wlbl">W${w}</div>`;
  h+=`</div></div>`;
  PHASES.forEach((ph,pi)=>{
    h+=`<div class="gantt-row"><div class="gantt-lbl" style="color:${ph.color};font-weight:500">${ph.emoji} ${ph.weeks}</div>
      <div class="gantt-track"><div class="gantt-bar" style="left:${ph.ws/WEEKS*100}%;width:${ph.wd/WEEKS*100}%;background:${ph.color}" onclick="nav({page:'phase',phaseId:${pi}})">F${pi+1}</div></div></div>`;
    ph.tasks.forEach(t=>{
      h+=`<div class="gantt-row"><div class="gantt-lbl">${t.name}</div>
        <div class="gantt-track"><div class="gantt-bar" style="left:${t.ws/WEEKS*100}%;width:${t.wd/WEEKS*100}%;background:${ph.color};opacity:.7" onclick="nav({page:'task',phaseId:${pi},taskId:'${t.id}'})">${t.wd>=2?t.name:''}</div></div></div>`;
    });
  });
  h+=`</div></div>`;

  h+=`<div class="phases-grid">`;
  PHASES.forEach((ph,pi)=>{
    let tot=0,done=0;
    ph.tasks.forEach(t=>t.actions.forEach((_,ai)=>{tot++;if(checks[`${t.id}-${ai}`])done++;}));
    h+=`<div class="phase-card" onclick="nav({page:'phase',phaseId:${pi}})">
      <div class="pc-header"><div class="pc-icon" style="background:${ph.bg}">${ph.emoji}</div>
        <div><div class="pc-name" style="color:${ph.color}">${ph.name}</div><div class="pc-period">${ph.weeks} · ${ph.tasks.length} taken · ${done}/${tot} acties</div></div></div>
      <div class="pc-body"><ul class="pc-tasks">${ph.tasks.slice(0,4).map(t=>`<li>${t.name}</li>`).join('')}${ph.tasks.length>4?`<li style="color:var(--g400)">+ ${ph.tasks.length-4} meer...</li>`:''}</ul></div>
      <div class="pc-arrow">Bekijk fase →</div>
    </div>`;
  });
  h+=`</div>`;
  document.getElementById('main').innerHTML=h;
}

function renderPhase(pi){
  const ph=PHASES[pi];
  let h=bc([{label:'Overzicht',nav:"nav({page:'overview'})"},{label:ph.name}]);
  h+=`<div class="ph-header" style="background:${ph.bg}">
    <div class="ph-icon">${ph.emoji}</div>
    <div><h1 style="color:${ph.color}">${ph.name}</h1><p style="color:${ph.color}">${ph.intro}</p>
    <div class="ph-pills"><span class="pill" style="color:${ph.color}">${ph.weeks}</span><span class="pill" style="color:${ph.color}">${ph.tasks.length} taken</span></div></div></div>`;
  h+=`<div class="dod-box"><h2>✅ Fase ${pi+1} is klaar als...</h2><div class="dod-grid">
    <div class="dod-col"><h3 style="color:#0B7B5A">Technisch</h3><ul>${ph.dod.tech.map(i=>`<li>${i}</li>`).join('')}</ul></div>
    <div class="dod-col"><h3 style="color:#B45309">Teamadoptie</h3><ul>${ph.dod.adoptie.map(i=>`<li>${i}</li>`).join('')}</ul></div>
  </div></div>`;
  h+=`<div class="tasks-section"><h2>Taken in deze fase</h2>`;
  ph.tasks.forEach((t,ti)=>{
    let tot=t.actions.length,done=t.actions.filter((_,ai)=>checks[`${t.id}-${ai}`]).length;
    const pct=tot?Math.round(done/tot*100):0;
    const wl=whoTag(t.who);
    h+=`<div class="task-card"><div class="tc-header" onclick="nav({page:'task',phaseId:${pi},taskId:'${t.id}'})">
      <div class="tc-left">
        <div class="tc-num" style="background:${ph.bg};color:${ph.color}">${ti+1}</div>
        <div><div class="tc-name">${t.name}</div>
          <div class="tc-meta"><span class="tc-week">${t.week}</span><span class="who-tag ${wl.cls}">${wl.label}</span><span style="font-size:11px;color:var(--g400)">${done}/${tot} acties</span></div></div></div>
      <div class="tc-right">
        <div class="tc-prog-wrap"><div class="tc-prog-fill" style="width:${pct}%;background:${ph.color}"></div></div>
        <div class="tc-pct" style="color:${ph.color}">${pct}%</div>
        <div class="tc-cta">Bekijk →</div>
      </div></div></div>`;
  });
  h+=`</div>`;
  document.getElementById('main').innerHTML=h;
}

function renderTask(pi,taskId){
  const ph=PHASES[pi];
  const t=ph.tasks.find(x=>x.id===taskId);
  const idx=ph.tasks.indexOf(t);
  const wl=whoTag(t.who);
  let h=bc([{label:'Overzicht',nav:"nav({page:'overview'})"},{label:ph.name,nav:`nav({page:'phase',phaseId:${pi}})`},{label:t.name}]);
  h+=`<div class="td-header">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div class="tc-num" style="background:${ph.bg};color:${ph.color};width:32px;height:32px;border-radius:8px;font-size:13px">${idx+1}</div>
      <h1>${t.name}</h1></div>
    <div class="td-meta"><span class="who-tag ${wl.cls}">${wl.label}</span><span class="tc-week">${t.week}</span><span style="font-size:12px;color:var(--g400)">${t.actions.length} acties</span></div>
    <p class="td-desc">${t.desc}</p>
    <div class="td-why"><p><strong>Waarom is dit belangrijk?</strong> ${t.why}</p></div>
  </div>`;
  const tot=t.actions.length,done=t.actions.filter((_,ai)=>checks[`${t.id}-${ai}`]).length;
  const pct=tot?Math.round(done/tot*100):0;
  h+=`<div class="actions-box"><h2>📋 Concrete acties (${done}/${tot} afgerond — ${pct}%)</h2>`;
  t.actions.forEach((a,ai)=>{
    const key=`${t.id}-${ai}`;const isDone=!!checks[key];const awl=whoTag(a.who);
    h+=`<div class="action-item">
      <div class="action-check${isDone?' done':''}" onclick="toggle('${key}')"></div>
      <div class="action-text${isDone?' done':''}">${a.t}</div>
      <span class="action-tag ${awl.cls}">${awl.label}</span>
    </div>`;
  });
  h+=`</div>`;
  h+=`<div class="dod-box"><h2>✅ Klaar als...</h2><div class="dod-grid">
    <div class="dod-col"><h3 style="color:#0B7B5A">Technisch</h3><ul>${t.dod.tech.length?t.dod.tech.map(i=>`<li>${i}</li>`).join(''):'<li style="color:var(--g400)">—</li>'}</ul></div>
    <div class="dod-col"><h3 style="color:#B45309">Adoptie</h3><ul>${t.dod.adoptie.length?t.dod.adoptie.map(i=>`<li>${i}</li>`).join(''):'<li style="color:var(--g400)">—</li>'}</ul></div>
  </div></div>`;
  h+=`<div class="nav-between">`;
  if(idx>0){const prev=ph.tasks[idx-1];h+=`<button class="nav-btn" onclick="nav({page:'task',phaseId:${pi},taskId:'${prev.id}'})">← ${prev.name}</button>`;}
  else h+=`<button class="nav-btn" onclick="nav({page:'phase',phaseId:${pi}})">← Terug naar fase</button>`;
  if(idx<ph.tasks.length-1){const next=ph.tasks[idx+1];h+=`<button class="nav-btn next" onclick="nav({page:'task',phaseId:${pi},taskId:'${next.id}'})">Volgende: ${next.name} →</button>`;}
  h+=`</div>`;
  document.getElementById('main').innerHTML=h;
}

function toggle(key){checks[key]=!checks[key];save();render()}
function nav(v){view={page:'overview',phaseId:null,taskId:null,...v};render();window.scrollTo(0,0)}
function render(){
  renderSidebar();
  if(view.page==='overview') renderOverview();
  else if(view.page==='phase') renderPhase(view.phaseId);
  else if(view.page==='task') renderTask(view.phaseId,view.taskId);
}
render();
</script>
</body>
</html>
