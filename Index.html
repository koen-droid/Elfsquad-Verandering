<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementatieplanning — Systeem Transitie</title>

<style>
:root{
  --blue:#1A56DB;--blue-light:#EBF1FF;
  --green:#0B7B5A;--green-light:#E3F5EE;
  --amber:#B45309;--amber-light:#FEF3C7;
  --red:#9B1C1C;--red-light:#FEE2E2;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g700:#374151;
  --g800:#1F2937;--g900:#111827;--r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:15px;line-height:1.6;color:var(--g800);background:var(--g50);min-height:100vh}

.topbar{background:var(--g900);color:white;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tl{display:flex;align-items:center;gap:12px}
.tlogo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white}
.ttitle{font-size:14px;font-weight:500}
.tsub{font-size:12px;color:var(--g400);margin-left:4px}
.tright{font-size:12px;color:var(--g400);font-family:monospace}

.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 56px)}

.sidebar{background:white;border-right:1px solid var(--g200);padding:1.25rem 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-sec{padding:0 .75rem;margin-bottom:.25rem}
.sb-btn{display:flex;align-items:flex-start;gap:10px;width:100%;padding:.5rem .75rem;border:none;background:transparent;border-radius:8px;cursor:pointer;text-align:left;transition:background .15s}
.sb-btn:hover,.sb-btn.on{background:var(--g100)}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.sb-name{font-size:12px;font-weight:500;color:var(--g700);line-height:1.3}
.sb-wk{font-size:11px;color:var(--g400);margin-top:1px}
.sb-tasks{padding-left:2rem;margin-top:.1rem}
.sb-task{display:block;width:100%;padding:.3rem .5rem;border:none;background:transparent;border-radius:6px;cursor:pointer;text-align:left;font-size:12px;color:var(--g500);transition:all .15s;line-height:1.4}
.sb-task:hover{background:var(--g100);color:var(--g700)}
.sb-task.on{background:var(--blue-light);color:var(--blue);font-weight:500}
.sb-div{height:1px;background:var(--g200);margin:.75rem .75rem}
.sb-prog{padding:.75rem 1.25rem}
.sb-plbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);margin-bottom:.5rem}
.sb-pr{display:flex;align-items:center;gap:8px;margin-bottom:.4rem}
.sb-pt{flex:1;height:4px;background:var(--g100);border-radius:2px;overflow:hidden}
.sb-pf{height:100%;border-radius:2px;transition:width .3s}
.sb-pp{font-size:10px;color:var(--g400);min-width:28px;text-align:right;font-family:monospace}

.main{padding:2rem;overflow-y:auto}

.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g400);margin-bottom:1.5rem;flex-wrap:wrap}
.bcl{cursor:pointer;transition:color .15s}.bcl:hover{color:var(--blue)}
.bcs{color:var(--g300)}.bcc{color:var(--g700);font-weight:500}

.ov-h{margin-bottom:2rem}
.ov-h h1{font-size:26px;font-weight:600;color:var(--g900);margin-bottom:6px}
.ov-h p{font-size:14px;color:var(--g500);max-width:600px;line-height:1.7}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:2rem}
.sc{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1rem 1.25rem}
.sc .n{font-size:28px;font-weight:600;color:var(--g900);line-height:1}
.sc .l{font-size:12px;color:var(--g500);margin-top:4px}

.alert{background:#FFF7ED;border:1px solid #FED7AA;border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;gap:12px;align-items:flex-start}
.ai{font-size:18px;flex-shrink:0;line-height:1.4}
.at{font-size:13px;color:#92400E;line-height:1.6}
.at strong{font-weight:600}

.gantt-card{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-bottom:2rem;overflow-x:auto}
.gantt-card h2{font-size:14px;font-weight:600;color:var(--g700);margin-bottom:1.25rem}
.gi{min-width:580px}
.gr{display:grid;grid-template-columns:155px 1fr;gap:10px;align-items:center;margin-bottom:5px}
.gl{font-size:11px;color:var(--g500);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gt{position:relative;height:20px;background:var(--g100);border-radius:4px}
.gb{position:absolute;top:1px;bottom:1px;border-radius:3px;cursor:pointer;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:500;color:white;white-space:nowrap;overflow:hidden;transition:opacity .15s}
.gb:hover{opacity:.82}
.gwh{display:grid;grid-template-columns:155px 1fr;gap:10px;margin-bottom:6px}
.gws{display:flex}
.gwl{flex:1;font-size:10px;color:var(--g400);text-align:center;font-family:monospace}

.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.pc{background:white;border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s}
.pc:hover{box-shadow:0 4px 12px rgba(0,0,0,.10);transform:translateY(-2px)}
.pch{padding:1rem 1.25rem;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:12px}
.pci{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pcn{font-size:13px;font-weight:600}
.pcp{font-size:11px;color:var(--g400);margin-top:2px}
.pcb{padding:1rem 1.25rem}
.pct{font-size:12px;color:var(--g500);list-style:none}
.pct li{padding:2px 0;display:flex;align-items:flex-start;gap:6px}
.pct li::before{content:"→";color:var(--g300);flex-shrink:0}
.pca{padding:.65rem 1.25rem;display:flex;justify-content:flex-end;font-size:12px;color:var(--blue);font-weight:500;border-top:1px solid var(--g100)}

.phh{border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem;display:flex;align-items:flex-start;gap:1rem}
.phi{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,255,255,.45);flex-shrink:0}
.phh h1{font-size:20px;font-weight:600;margin-bottom:4px}
.phh p{font-size:13px;opacity:.8;line-height:1.6}
.phpills{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.4)}

.dod{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.dod h2{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:1rem}
.dodg{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.dodc h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem}
.dodc ul{list-style:none}
.dodc ul li{font-size:12px;color:var(--g600);padding:5px 0 5px 18px;position:relative;border-bottom:1px solid var(--g100);line-height:1.4}
.dodc ul li:last-child{border-bottom:none}
.dodc ul li::before{content:"✓";position:absolute;left:0;font-size:11px;color:var(--g400)}

.ts h2{font-size:14px;font-weight:600;color:var(--g700);margin-bottom:1rem}
.tc{background:white;border:1px solid var(--g200);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s}
.tc:hover{box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tch{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;cursor:pointer;user-select:none}
.tcl{display:flex;align-items:center;gap:12px}
.tnum{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.tname{font-size:13px;font-weight:500;color:var(--g800)}
.tmeta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
.twk{font-size:11px;color:var(--g400);font-family:monospace}
.wtag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.wt{background:#EBF5FF;color:#1A56DB}
.wa{background:#FEF3C7;color:#92400E}
.wm{background:#F5F3FF;color:#5B21B6}
.tcr{display:flex;align-items:center;gap:12px}
.tpw{width:60px;height:4px;background:var(--g100);border-radius:2px;overflow:hidden}
.tpf{height:100%;border-radius:2px}

.tdh{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem}
.tdh h1{font-size:20px;font-weight:600;color:var(--g900);margin-bottom:8px}
.tdm{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.tdd{font-size:14px;color:var(--g600);line-height:1.7}
.tdw{background:var(--g50);border-left:3px solid var(--g300);padding:.75rem 1rem;margin-top:1rem;border-radius:0 6px 6px 0}
.tdw p{font-size:13px;color:var(--g600);line-height:1.6}
.tdw strong{color:var(--g700)}

.abox{background:white;border:1px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem}
.abox h2{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:1rem}
.aitem{display:flex;align-items:flex-start;gap:12px;padding:.65rem 0;border-bottom:1px solid var(--g100)}
.aitem:last-child{border-bottom:none}
.ach{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--g300);flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;user-select:none}
.ach.done{background:var(--green);border-color:var(--green)}
.ach.done::after{content:"✓"}
.atxt{font-size:13px;color:var(--g700);line-height:1.5;flex:1}
.atxt.done{text-decoration:line-through;color:var(--g400)}
.atag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;flex-shrink:0;margin-top:2px}

.nav2{display:flex;justify-content:space-between;margin-top:1rem;gap:8px}
.nbtn{display:inline-flex;align-items:center;gap:6px;font-size:13px;background:transparent;border:none;cursor:pointer;padding:.5rem 1rem;border-radius:8px;transition:background .15s;color:var(--g500)}
.nbtn:hover{background:var(--g100);color:var(--g700)}
.nbtn.nx{color:var(--blue)}.nbtn.nx:hover{background:var(--blue-light)}

@media(max-width:768px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--g200)}
  .stats{grid-template-columns:repeat(2,1fr)}
  .pg{grid-template-columns:1fr}
  .dodg{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="tl">
    <div class="tlogo">S</div>
    <span class="ttitle">Systeem Transitie — Implementatieplanning</span>
    <span class="tsub">HubSpot · Elfsquad · Business Central</span>
  </div>
  <div class="tright">6 maanden · 15+ personen · 24 weken</div>
</div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>
<script>
const W=24;
const PH=[
  {
    id:0,emoji:"🔍",name:"Fase 1 — Fundament leggen",color:"#1A56DB",bg:"#EBF1FF",
    weeks:"Week 1 – 4",ws:0,wd:4,
    intro:"Voordat er iets technisch gebouwd wordt, moet het fundament op orde zijn. In deze fase weet je precies wat er moet, wie het gaat doen, en begrijpt het team waarom deze verandering nodig is.",
    dod:{
      tech:[
        "Er is een technische partij gekozen én schriftelijk bevestigd voor de HubSpot-koppelingen",
        "Er is een technische partij gekozen én schriftelijk bevestigd voor Business Central",
        "Beide partijen hebben een planning afgegeven met een startdatum voor de bouw",
        "Het is op papier vastgelegd welke gegevens tussen de drie systemen worden uitgewisseld",
        "Er is een testomgeving beschikbaar waarmee zonder risico geoefend kan worden"
      ],
      adoptie:[
        "Alle medewerkers zijn persoonlijk geïnformeerd over de verandering en het waarom",
        "Elke medewerker weet wat zijn of haar nieuwe rol wordt en wat er concreet verandert",
        "Er is één intern aanspreekpunt aangewezen voor dit project",
        "Medewerkers hebben de ruimte gehad om vragen en zorgen te uiten",
        "Er is een vast, terugkerend overlegmoment ingepland voor de duur van het project"
      ]
    },
    tasks:[
      {
        id:"1-1",name:"Technische partij selecteren voor HubSpot-koppelingen",week:"Week 1 – 2",ws:0,wd:2,who:"mgmt",
        desc:"Je hebt een externe partij nodig die de automatische koppelingen bouwt tussen HubSpot, Elfsquad en Business Central. Dit is gespecialiseerd maatwerk — het gaat om API-verbindingen die foutloos moeten werken. Zonder een bevestigde partij staat alles stil.",
        why:"Dit is de meest urgente actie van het hele project. Zonder technische partij kan de bouw niet starten, schuift alles op en mis je je deadline van 6 maanden.",
        actions:[
          {t:"Maak een shortlist van minimaal 3 partijen die gespecialiseerd zijn in HubSpot-integraties. Zoek via het HubSpot Solutions Partner-programma op hubspot.com/solutions-partners.",who:"mgmt"},
          {t:"Controleer voor elke partij op hun website of zij ervaring hebben met koppelingen naar ERP-systemen of configuratietools zoals Elfsquad.",who:"mgmt"},
          {t:"Stuur elke partij een e-mail met minimaal de volgende informatie: jullie willen de drie systemen HubSpot, Elfsquad en Business Central automatisch met elkaar laten communiceren; het gaat om 15 of meer gebruikers; de gewenste livegang is binnen 6 maanden; vraag een offerte inclusief aanpak, doorlooptijd en twee referenties van vergelijkbare projecten.",who:"mgmt"},
          {t:"Vraag elke partij een offerte op te stellen inclusief: geschatte doorlooptijd, aanpak, indicatief budget en minimaal 2 referenties van vergelijkbare projecten.",who:"mgmt"},
          {t:"Bel de opgegeven referenties na: is de partij betrouwbaar, halen ze deadlines, hoe communiceren ze?",who:"mgmt"},
          {t:"Vergelijk de drie offertes op prijs, beschikbaarheid, doorlooptijd en kwaliteit van de aanpak.",who:"mgmt"},
          {t:"Kies één partij en bevestig de samenwerking schriftelijk met een duidelijke scope en startdatum.",who:"mgmt"},
          {t:"Plan binnen één week na de schriftelijke bevestiging een eerste werksessie in om de technische details door te spreken.",who:"mgmt"}
        ],
        dod:{tech:["Partij gekozen, schriftelijk bevestigd, eerste werksessie ingepland"],adoptie:[]}
      },
      {
        id:"1-2",name:"Technische partij selecteren voor Business Central",week:"Week 1 – 2",ws:0,wd:2,who:"mgmt",
        desc:"Business Central vereist een gecertificeerde Microsoft-partner. Dit kan dezelfde partij zijn als voor HubSpot, maar dat hoeft niet. Vraag eerst je huidige BC-leverancier of zij dit ook kunnen.",
        why:"BC is een Microsoft-product met specifieke kennis vereist. Een partij die dit niet kent maakt fouten in de orderadministratie — dat kost je veel meer tijd dan het selectieproces nu.",
        actions:[
          {t:"Neem contact op met je huidige Business Central-leverancier en vraag of zij ook koppelingen met externe systemen kunnen bouwen via API.",who:"mgmt"},
          {t:"Stel in het gesprek de volgende concrete vraag: hebben jullie een koppeling gebouwd waarbij een extern systeem automatisch een verkooporder aanmaakt in Business Central op basis van een statuswijziging in een ander systeem? Vraag om een concreet voorbeeld.",who:"mgmt"},
          {t:"Als je huidige BC-leverancier dit niet kan of te duur is: zoek een alternatieve gecertificeerde Microsoft-partner via appsource.microsoft.com.",who:"mgmt"},
          {t:"Beslis bewust: ga je met één partij voor alles (HubSpot + BC) of twee aparte partijen? Één partij is eenvoudiger te coördineren; twee partijen kunnen elk hun specialisme inzetten.",who:"mgmt"},
          {t:"Bevestig de BC-partij schriftelijk met scope: zij ontvangen orders vanuit HubSpot, maken klanten en orders aan in BC, en sturen het BC-ordernummer terug.",who:"mgmt"},
          {t:"Zorg dat de HubSpot-partij en de BC-partij binnen één week na bevestiging een gezamenlijk afstemmingsgesprek hebben om te bepalen wie welke kant van de koppeling bouwt.",who:"mgmt"}
        ],
        dod:{tech:["BC-partij gekozen en bevestigd","Afstemming tussen HubSpot-partij en BC-partij heeft plaatsgevonden"],adoptie:[]}
      },
      {
        id:"1-3",name:"Intern projectverantwoordelijke aanwijzen",week:"Week 1",ws:0,wd:1,who:"mgmt",
        desc:"Één persoon intern stuurt dit project aan. Niet technisch per se, maar iemand met overzicht, beslissingsbevoegdheid en voldoende tijd. Bij 15+ medewerkers en meerdere externe partijen is dit geen luxe maar noodzaak.",
        why:"Zonder intern aanspreekpunt gaat communicatie verloren, worden beslissingen uitgesteld en komen externe partijen vragen stellen bij de verkeerde persoon. Dat vertraagt alles.",
        actions:[
          {t:"Wijs intern één persoon aan als projectverantwoordelijke voor deze transitie.",who:"mgmt"},
          {t:"Leg schriftelijk vast wat deze persoon mag beslissen zonder escalatie en wanneer hij of zij toestemming nodig heeft van het management.",who:"mgmt"},
          {t:"Reserveer voor deze persoon minimaal 4 uur per week in zijn of haar agenda specifiek voor dit project.",who:"mgmt"},
          {t:"Stel wekelijks een vast moment in waarop de projectverantwoordelijke kort overlegt met de technische partijen — 30 minuten is genoeg.",who:"mgmt"},
          {t:"Communiceer de naam, rol en bereikbaarheid van de projectverantwoordelijke aan alle medewerkers én de externe partijen.",who:"mgmt"}
        ],
        dod:{tech:[],adoptie:["Projectverantwoordelijke aangewezen en gecommuniceerd aan team en externe partijen"]}
      },
      {
        id:"1-4",name:"Vastleggen welke gegevens tussen systemen worden uitgewisseld",week:"Week 2 – 3",ws:1,wd:2,who:"mgmt",
        desc:"Voordat de technische partij ook maar één regel code schrijft, moet helder zijn welke gegevens van welk systeem naar welk systeem gaan. Dit is de blauwdruk voor alles wat erna komt.",
        why:"Als dit niet op papier staat, gaan de technische partijen aannames maken. Aannames leiden tot fouten. Fouten kosten tijd en geld om achteraf te herstellen.",
        actions:[
          {t:"Benoem per systeem de rol: HubSpot is het startpunt voor klant- en dealinformatie. Elfsquad is de centrale plek voor offertes en productconfiguratie. Business Central is uitsluitend voor orderadministratie.",who:"mgmt"},
          {t:"Schrijf op welke klantgegevens vanuit HubSpot naar Elfsquad moeten: bedrijfsnaam, factuuradres, afleveradres, BTW-nummer, taal van de klant, valuta en betaalcondities.",who:"mgmt"},
          {t:"Schrijf op welke contactpersoongegevens meegaan: voornaam, achternaam, e-mailadres en telefoonnummer.",who:"mgmt"},
          {t:"Schrijf op welke dealinformatie meegaat: de naam van de deal, het unieke deal-ID vanuit HubSpot en de verwachte sluitingsdatum.",who:"mgmt"},
          {t:"Schrijf op wat Elfsquad terugstuurt naar HubSpot: het offerte-ID, de offertestatus (concept / verzonden / geaccepteerd / geweigerd), het versienummer, het totaalbedrag en de offerte-PDF als bijlage.",who:"tech"},
          {t:"Schrijf op wat er naar Business Central gaat: alleen bij een gewonnen deal — klantgegevens, adres, BTW, betaalcondities, en de orderregels met productcode, omschrijving, aantal en prijs.",who:"tech"},
          {t:"Schrijf op wat BC teruggeeft: het BC-ordernummer dat in HubSpot wordt opgeslagen bij de betreffende deal.",who:"tech"},
          {t:"Stuur het gegevensoverzicht per e-mail naar beide technische partijen met de vraag: kloppen de velden en de richting van de koppelingen? Zijn er velden die ontbreken of die technisch niet haalbaar zijn? Verwacht binnen vijf werkdagen een schriftelijke bevestiging of een lijst met opmerkingen.",who:"tech"}
        ],
        dod:{tech:["Gegevensoverzicht klaar, bevestigd door technische partijen"],adoptie:[]}
      },
      {
        id:"1-5",name:"Kick-off sessie met het hele team",week:"Week 2 – 3",ws:1,wd:2,who:"adopt",
        desc:"15+ mensen die verrast worden door een nieuwe werkwijze is een recept voor weerstand. Vroeg communiceren, het waarom uitleggen en ruimte geven voor vragen maakt het verschil tussen adoptie en sabotage.",
        why:"Weerstand bij de livegang is bijna altijd te herleiden naar mensen die zich niet gehoord voelden. Voorkom dit nu, niet achteraf.",
        actions:[
          {t:"Plan een sessie van 1,5 uur voor alle betrokken medewerkers: binnendienst, buitendienst en werkvoorbereiders.",who:"mgmt"},
          {t:"Bereid vier onderdelen voor: (1) wat gaat er nu mis in het huidige proces, (2) hoe ziet de nieuwe werkwijze eruit, (3) wat verandert er concreet per rol, (4) wat is de planning en wanneer wordt wat verwacht.",who:"mgmt"},

let view={page:'overview',phaseId:null,taskId:null};
let checks=JSON.parse(localStorage.getItem('stt_checks')||'{}');
function save(){localStorage.setItem('stt_checks',JSON.stringify(checks))}

function wtag(w){
  if(w==='tech') return {l:'Techniek',c:'wt'};
  if(w==='adopt') return {l:'Adoptie',c:'wa'};
  return {l:'Management',c:'wm'};
}

function renderSB(){
  const sb=document.getElementById('sidebar');
  let h='';
  PH.forEach((ph,pi)=>{
    const on=view.phaseId===pi;
    h+="<div class=\"sb-sec\"><button class=\"sb-btn"+(on?' on':'')+"\" onclick=\"go({page:'phase',phaseId:"+(pi)+"})\">\n      <div class=\"sb-dot\" style=\"background:"+(ph.color)+"\"></div>\n      <div><div class=\"sb-name\">"+(ph.name)+"</div><div class=\"sb-wk\">"+(ph.weeks)+"</div></div>\n    </button>";
    if(on){
      h+="<div class=\"sb-tasks\">";
      ph.tasks.forEach(t=>{h+="<button class=\"sb-task"+(view.taskId===t.id?' on':'')+"\" onclick=\"go({page:'task',phaseId:"+(pi)+",taskId:'"+(t.id)+"'})\">"+(t.name)+"</button>";});
      h+="</div>";
    }
    h+="</div>";
  });
  h+="<div class=\"sb-div\"></div><div class=\"sb-prog\"><div class=\"sb-plbl\">Voortgang acties</div>";
  PH.forEach((ph,pi)=>{
    let tot=0,done=0;
    ph.tasks.forEach(t=>t.actions.forEach((_,ai)=>{tot++;if(checks[(t.id)+"-"+(ai)])done++;}));
    const p=tot?Math.round(done/tot*100):0;
    h+="<div class=\"sb-pr\"><div style=\"font-size:14px;min-width:16px\">"+(ph.emoji)+"</div><div class=\"sb-pt\"><div class=\"sb-pf\" style=\"width:"+(p)+"%;background:"+(ph.color)+"\"></div></div><div class=\"sb-pp\">"+(p)+"%</div></div>";
  });
  h+="</div>";
  sb.innerHTML=h;
}

function BCS(items){
  return "<div class=\"bc\">"+(items.map((it,i)=>{
    if(i===items.length-1) return '<span class="bcc">'+it.l+'</span>';
    return '<span class="bcl" onclick="'+it.n+'">'+it.l+'</span><span class="bcs">›</span>';
  }).join(''))+"</div>";
}

    const pct=tot?Math.round(done/tot*100):0;
    const wl=wtag(t.who);
    h+="<div class=\"tc\"><div class=\"tch\" onclick=\"go({page:'task',phaseId:"+(pi)+",taskId:'"+(t.id)+"'})\">\n      <div class=\"tcl\"><div class=\"tnum\" style=\"background:"+(ph.bg)+";color:"+(ph.color)+"\">"+(ti+1)+"</div>\n        <div><div class=\"tname\">"+(t.name)+"</div>\n          <div class=\"tmeta\"><span class=\"twk\">"+(t.week)+"</span><span class=\"wtag "+(wl.c)+"\">"+(wl.l)+"</span><span style=\"font-size:11px;color:var(--g400)\">"+(done)+"/"+(tot)+"</span></div></div></div>\n      <div class=\"tcr\"><div class=\"tpw\"><div class=\"tpf\" style=\"width:"+(pct)+"%;background:"+(ph.color)+"\"></div></div>\n        <div style=\"font-size:11px;font-weight:500;color:"+(ph.color)+";min-width:28px;text-align:right\">"+(pct)+"%</div>\n        <div style=\"font-size:12px;color:var(--blue);font-weight:500;white-space:nowrap\">Bekijk →</div></div></div></div>";
  });
  h+="</div>";
  document.getElementById('main').innerHTML=h;
}

function renderTask(pi,tid){
  const ph=PH[pi];
  const t=ph.tasks.find(x=>x.id===tid);
  const idx=ph.tasks.indexOf(t);
  const wl=wtag(t.who);
  let h=BCS([{l:'Overzicht',n:"go({page:'overview'})"},{l:ph.name,n:"go({page:'phase',phaseId:"+(pi)+"})"},{l:t.name}]);
  h+="<div class=\"tdh\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n      <div class=\"tnum\" style=\"background:"+(ph.bg)+";color:"+(ph.color)+";width:32px;height:32px;border-radius:8px;font-size:13px\">"+(idx+1)+"</div>\n      <h1>"+(t.name)+"</h1></div>\n    <div class=\"tdm\"><span class=\"wtag "+(wl.c)+"\">"+(wl.l)+"</span><span class=\"twk\">"+(t.week)+"</span><span style=\"font-size:12px;color:var(--g400)\">"+(t.actions.length)+" acties</span></div>\n    <p class=\"tdd\">"+(t.desc)+"</p>\n    <div class=\"tdw\"><p><strong>Waarom nu?</strong> "+(t.why)+"</p></div></div>";

  const tot=t.actions.length,done=t.actions.filter((_,ai)=>checks[(t.id)+"-"+(ai)]).length;
  const pct=tot?Math.round(done/tot*100):0;
  h+="<div class=\"abox\"><h2>📋 Concrete acties — "+(done)+" van "+(tot)+" afgerond ("+(pct)+"%)</h2>";
  t.actions.forEach((a,ai)=>{
    const key=(t.id)+"-"+(ai);const isDone=!!checks[key];const awl=wtag(a.who);
    h+="<div class=\"aitem\">\n      <div class=\"ach"+(isDone?' done':'')+"\" onclick=\"toggle('"+(key)+"')\"></div>\n      <div class=\"atxt"+(isDone?' done':'')+"\">"+(a.t)+"</div>\n      <span class=\"atag "+(awl.c)+"\">"+(awl.l)+"</span></div>";
  });
  h+="</div>";

  h+="<div class=\"dod\"><h2>✅ Deze taak is klaar als...</h2><div class=\"dodg\">\n    <div class=\"dodc\"><h3 style=\"color:#0B7B5A\">Technisch</h3><ul>"+(t.dod.tech.length?t.dod.tech.map(i=>'<li>'+i+'</li>').join(''):'<li style="color:var(--g400)">Niet van toepassing</li>')+"</ul></div>\n    <div class=\"dodc\"><h3 style=\"color:#B45309\">Adoptie</h3><ul>"+(t.dod.adoptie.length?t.dod.adoptie.map(i=>'<li>'+i+'</li>').join(''):'<li style="color:var(--g400)">Niet van toepassing</li>')+"</ul></div>\n  </div></div>";

  h+="<div class=\"nav2\">";
  if(idx>0){const p=ph.tasks[idx-1];h+="<button class=\"nbtn\" onclick=\"go({page:'task',phaseId:"+(pi)+",taskId:'"+(p.id)+"'})\">← "+(p.name)+"</button>";}
  else h+="<button class=\"nbtn\" onclick=\"go({page:'phase',phaseId:"+(pi)+"})\">← Terug naar fase</button>";
  if(idx<ph.tasks.length-1){const n=ph.tasks[idx+1];h+="<button class=\"nbtn nx\" onclick=\"go({page:'task',phaseId:"+(pi)+",taskId:'"+(n.id)+"'})\">Volgende: "+(n.name)+" →</button>";}
  h+="</div>";
  document.getElementById('main').innerHTML=h;
}

function toggle(key){checks[key]=!checks[key];save();render()}
function go(v){view={page:'overview',phaseId:null,taskId:null,...v};render();window.scrollTo(0,0)}
function render(){
  renderSB();
  if(view.page==='overview') renderOV();
  else if(view.page==='phase') renderPH(view.phaseId);
  else if(view.page==='task') renderTask(view.phaseId,view.taskId);
}
render();
</script>
</body>
</html>
